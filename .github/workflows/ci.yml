name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test:coverage

      - name: Type check
        run: npx tsc --noEmit

      - name: Build extension
        run: npm run build

      - name: Validate manifest
        run: node -e "const m = require('./dist/manifest.json'); if (!m.manifest_version || !m.name || !m.version) throw new Error('Invalid manifest');"

      - name: Check bundle size
        run: |
          SIZE=$(du -sb dist | cut -f1)
          if [ $SIZE -gt 20971520 ]; then
            echo "Bundle size $SIZE exceeds 20MB limit"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-build
          path: dist/
          retention-days: 7
